app:
  log_level: INFO
  experiment_name: fast_bowling_analysis

data:
  video_dir: videos
  formats: [mp4, avi, mov]

video:
  start_timestamp_ms: 0
  enforce_fps: false

frames:
  output_dir: frames
  nth_frame: 10
  image_format: jpg
  frame_glob: frame_*.jpg

pose:
  model:
    path: models/pose_landmarker_full.task
    num_poses: 1
    confidences:
      detection: 0.6
      presence: 0.6
      tracking: 0.6
  
  overlay:
    visibility_threshold: 0.5
    point_radius: 3
    line_thickness: 2
  
  output:
    root_dir: pose_outputs
    write_jsonl: true
    jsonl_name: pose_landmarks.jsonl
    write_annotated_frames: true
    annotated_dir: annotated

  qa:
    max_no_pose_ratio: 0.7
    max_pose_gap: 10

metadata:
  output_path: metadata/metadata.json