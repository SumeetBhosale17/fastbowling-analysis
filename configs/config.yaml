app:
  log_level: INFO
  experiment_name: fast_bowling_analysis

data:
  video_dir: data/raw_videos
  output_dir: data/processed
  formats: [mp4, avi, mov]

video:
  frame_stride: 1
  start_timestamp_ms: 0
  # Input acceptance + server-side handling (see CLAUDE.md §3)
  max_input_height: 1080
  min_fps_warn: 60
  min_fps_reject: 30
  min_bowler_frame_fraction: 0.40

pose:
  model:
    path: models/pose_landmarker_full.task
    num_poses: 1
    confidences:
      detection: 0.6
      presence: 0.6
      tracking: 0.6

  qa:
    max_no_pose_ratio: 0.7
    max_pose_gap: 60
