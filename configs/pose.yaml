app:
  log_level: INFO

io:
  frames_dir: "frames"
  frame_glob: "frame_*.jpg"
  output_dir: "pose_output"
  write_json: true
  json_path: "pose_landmarks.jsonl"
  write_annotated_frames: true
  annotated_dir: "annotated"

video:
  fps: 30.0
  start_timestamp_ms: 0

model:
  task_model_path: "models/pose_landmarker_full.task"
  running_mode: VIDEO
  num_poses: 1
  min_pose_detection_confidence: 0.6
  min_pose_presence_confidence: 0.6
  min_tracking_confidence: 0.6

overlay:
  visibility_threshold: 0.5
  point_radius: 3
  line_thickness: 2

qa:
  max_no_pose_ratio: 0.7